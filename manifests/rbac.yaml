apiVersion: v1
kind: ServiceAccount
metadata:
  name: health-guardian-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-restarter-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-restarter-binding
subjects:
- kind: ServiceAccount
  name: health-guardian-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: pod-restarter-role
  apiGroup: rbac.authorization.k8s.io